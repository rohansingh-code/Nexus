spring:
  application:
    name: ai-service

  ai:
    openai:
      api-key: ${GROQ_API_KEY}
      base-url: https://api.groq.com/openai
      chat:
        options:
          model: llama-3.3-70b-versatile
          temperature: 0.3

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

server:
  port: 8081

hospital:
  service:
    url: ${HOSPITAL_SERVICE_URL:http://localhost:8080}